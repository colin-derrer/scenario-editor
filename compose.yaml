services:
  postgis:
    container_name: postgis
    image: postgis/postgis:18-3.6
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    profiles:
      - core

  martin:
    container_name: martin
    image: ghcr.io/maplibre/martin:1.3.1
    command: "--config /opt/martin/config.yaml"
    ports:
      - "1337:3000"
    volumes:
      - ./dev_data/martin-config.yaml:/opt/martin/config.yaml
      - ./dev_data/rio/jaxa_terrainrgb_0-12.mbtiles:/opt/mbtiles/jaxa_terrainrgb_0-12.mbtiles
      - ./dev_data/pmtiles/elevation.pmtiles:/opt/pmtiles/elevation.pmtiles
    restart: unless-stopped
    profiles:
      - auxillary

  maputnik:
    container_name: maputnik
    image: ghcr.io/maplibre/maputnik:main
    network_mode: "host"
    profiles:
      - auxillary
    # ports:
    #   - "8888:8000"

volumes:
  postgres-data:
